<!DOCTYPE html>
<html>
<head>
<title>Brian's Fantasy Golf Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
padding:20px;
background:#020617;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

.top7{
color:#22c55e;
font-weight:bold;
}

.top20{
color:#38bdf8;
}

</style>
</head>

<body>

<header>
<h1>Fantasy Golf Dashboard </h1>
</header>

<div class="container">

<h2>Your Players</h2>

<table id="board">

<tr>
<th>Player</th>
<th>Pos</th>
<th>Score</th>
<th>Hole</th>
<th>Status</th>
<th>Pts</th>
</tr>

</table>

</div>

<script>

const players=[
"Scottie Scheffler",
"Rory McIlroy",
"J.J. Spaun",
"Ben Griffin",
"Ludvig Aberg",
"Collin Morikawa",
"Viktor Hovland",
"Shane Lowry",
"Chris Gotterup",
"Akshay Bhatia",
"Xander Schauffele",
"Thomas Detry",
"Aldrich Potgieter",
"Wyndham Clark",
"Stephan Jaeger",
"Patrick Rodgers",
"Tony Finau",
"Erik van Rooyen",
"Davis Thompson",
"Nicolai Hojgaard",
"Rasmus Hojgaard",
"Sami Valimaki",
"Michael Thorbjornsen",
"Matt Wallace",
"Tom Kim",
"Vince Whaley",
"Austin Eckroat",
"Max Homa",
"Brooks Koepka",
"Luke Clanton"
];

function pts(p){

if(p==1)return 10;
if(p==2)return 6;
if(p==3)return 5;
if(p==4)return 4;
if(p==5)return 3;
if(p==6)return 2;
if(p==7)return 1;

return 0;

}

const demo=[

{n:"Scottie Scheffler",p:2,s:"-7",h:"14"},
{n:"Collin Morikawa",p:6,s:"-5",h:"12"},
{n:"Rory McIlroy",p:14,s:"-3",h:"9"},
{n:"Xander Schauffele",p:18,s:"-2",h:"7"},
{n:"Tony Finau",p:24,s:"+1",h:"5"}

];

let t=document.getElementById("board");

demo.forEach(x=>{

let st="Outside";
let c="";

if(x.p<=7){st="Top 7";c="top7";}
else if(x.p<=20){st="Top 20";c="top20";}

t.innerHTML+=`

<tr class="${c}">
<td>${x.n}</td>
<td>${x.p}</td>
<td>${x.s}</td>
<td>${x.h}</td>
<td>${st}</td>
<td>${pts(x.p)}</td>
</tr>

`;

});

</script>

</body>
</html>
<script>

async function loadLeaderboard(){

const response = await fetch("/api/leaderboard");
const players = await response.json();

const table = document.querySelector("table");
table.innerHTML = `
<tr>
<th>Player</th>
<th>Pos</th>
<th>Score</th>
<th>Hole</th>
</tr>
`;

players.slice(0,10).forEach(p=>{

table.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.pos}</td>
<td>${p.score}</td>
<td>${p.thru}</td>
</tr>
`;

});

}

loadLeaderboard();

setInterval(loadLeaderboard,300000);

</script>
